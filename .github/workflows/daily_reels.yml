name: Daily Viral Reels Scraper

on:
  schedule:
    # IST → UTC conversion (IST = UTC+5:30)
    - cron: '0 4 * * *'    # 09:30 IST
    - cron: '30 6 * * *'   # 12:00 IST
    - cron: '0 11 * * *'   # 16:30 IST
    - cron: '30 13 * * *'  # 19:00 IST
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache key specified - avoids lock-file error entirely

      - name: Install system dependencies (yt-dlp & ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install Node.js dependencies
        run: |
          # Use lock file if present, otherwise fall back to npm install
          if [ -f package-lock.json ]; then
            echo "✅ Found package-lock.json, using npm ci"
            npm ci
          else
            echo "⚠️ No lock file found, using npm install"
            npm install
          fi

      - name: Run scraper & upload to Instagram
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node index.js --run-now

      - name: Commit updated history (downloaded.json)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "bot@github.com"
          git add downloaded.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Sync downloaded history [skip ci]"
          git push

